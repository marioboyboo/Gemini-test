<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Chaos Fart Machine</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-ui {
            z-index: 1000;
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            transition: all 0.2s;
        }

        .btn-start { background: #28a745; color: white; }
        .btn-chaos { background: #dc3545; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }

        /* Classic Windows Error Style */
        .err-box {
            position: absolute;
            width: 220px;
            background: #f0f0f0;
            border: 1px solid #000;
            box-shadow: 3px 3px 0px #888;
            z-index: 5000;
            color: #000;
        }

        .err-header {
            background: #004e92;
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .err-body {
            padding: 20px 10px;
            text-align: center;
            font-size: 13px;
        }

        .ok-btn {
            background: #e1e1e1;
            border: 1px solid #777;
            padding: 2px 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .fart-cloud {
            position: absolute;
            font-size: 50px;
            pointer-events: none;
            z-index: 4000;
            animation: blowUp 1s ease-out forwards;
        }

        @keyframes blowUp {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="main-ui">
        <h1>💨 Maximum Chaos Fart Machine 💨</h1>
        <button class="btn-start" onclick="singleBlast()">Start</button>
        <button class="btn-chaos" onclick="goInfinite()">MAXIMUM CHAOS</button>
    </div>

    <script>
        // Updated filename
        const audioPath = 'fart-meme-sound.mp3';

        function singleBlast() {
            const sound = new Audio(audioPath);
            sound.play().catch(e => console.log("Interaction required first!"));
            spawnCloud();
        }

        function spawnError() {
            const box = document.createElement('div');
            box.className = 'err-box';
            
            const x = Math.random() * (window.innerWidth - 220);
            const y = Math.random() * (window.innerHeight - 120);
            box.style.left = x + 'px';
            box.style.top = y + 'px';

            box.innerHTML = `
                <div class="err-header"><span>Windows System Error</span><span>✕</span></div>
                <div class="err-body">
                    Too many farts detected.
                    <br><br>
                    <button class="ok-btn" onclick="this.closest('.err-box').remove()">OK</button>
                </div>
            `;
            document.body.appendChild(box);
        }

        function spawnCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'fart-cloud';
            cloud.innerText = '💨';
            cloud.style.left = Math.random() * 90 + 'vw';
            cloud.style.top = Math.random() * 90 + 'vh';
            document.body.appendChild(cloud);
            setTimeout(() => cloud.remove(), 1000);
        }

        function goInfinite() {
            // This loop creates the "Chaos" from your video
            setInterval(() => {
                const multiSound = new Audio(audioPath);
                multiSound.play();
                spawnError();
                spawnCloud();
            }, 100); // 10 times per second
        }
    </script>
</body>
</html>
